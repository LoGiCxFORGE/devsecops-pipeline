name: Intelligent DevSecOps Pipeline

on:

  workflow_dispatch:

  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"

  pull_request:
    paths:
      - "app/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"

jobs:

  # Detect what changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}

    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'app/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'

  # Pre-commit (lint + SAST + secrets)
  precommit:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v1

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1


  # Dependency scanning (SCA) checks dependencies/packages for known vulnerabilities
  sca:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true # [OPTIMIZED] Speeds up repeat runs by caching downloads

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Safety
        run: uvx --from safety safety check

  # Build if code changed (after checks pass)
  build-and-push: # [CONSOLIDATED] Combined build logic for efficiency
    name: Build and Push to Docker Hub
    needs: [detect-changes, precommit, sca]
    if: |
      always() &&
      (needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.docker == 'true')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx # [OPTIMIZED] Better caching for Docker layers
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-test:latest
          cache-from: type=gha # [OPTIMIZED] Use GitHub Actions for layer caching
          cache-to: type=gha,mode=max

  # Container image scanning
  container-scan:
    name: Container Security Scan & SBOM
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-test:latest
          severity: HIGH,CRITICAL
          exit-code: 1 # Fails the pipeline if bad stuff is found

      - name: Generate SBOM (The Ingredients List)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-test:latest
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: application-sbom
          path: sbom.json

  # Dynamic security testing (runtime attack simulation)
  # [OPTIMIZED] No rebuild! Just pull and run.
  dast:
    name: Dynamic Application Security Testing
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run application container
        run: |
          docker run -d -p 8000:8000 --name app ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-test:latest
          sleep 15 # Give the FastAPI/Uvicorn app time to boot

      - name: Fix workspace permissions for ZAP
        # [NEW] This allows the ZAP container to write reports to the workspace
        run: chmod -R 777 ${{ github.workspace }}

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          # 'fail_action: true' means the pipeline stops if vulnerabilities are found
          fail_action: true
          # This tells ZAP to save an HTML report specifically
          cmd_options: "-r zap_report.html"

      - name: Upload Scan Report
        if: always() # Ensures you get the report even if the scan fails!
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap_report.html
